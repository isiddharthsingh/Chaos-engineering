# The agent runtime's own namespace and the tiered ServiceAccounts.
#
# One ServiceAccount per capability tier. The agent process authenticates as
# agent-observer for read/observe work and only assumes agent-experimenter when
# a policy-approved experiment executes. Neither is ever cluster-admin.
apiVersion: v1
kind: Namespace
metadata:
  name: chaos-agent-system
  labels:
    app.kubernetes.io/part-of: chaosagent
    # The agent's own namespace is NOT chaos-enabled — it never experiments on itself.
    chaos-enabled: "false"
---
# Tier 1: read-only. get/list/watch across the cluster for observation only.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-observer
  namespace: chaos-agent-system
  labels:
    app.kubernetes.io/part-of: chaosagent
    chaosagent.dev/capability-tier: observer
---
# Tier 2: experimenter. Creates chaos CRs and patches replica counts, but ONLY
# in namespaces where a RoleBinding grants it (see 02-experimenter-role.yaml).
# It has no cluster-wide write binding anywhere.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-experimenter
  namespace: chaos-agent-system
  labels:
    app.kubernetes.io/part-of: chaosagent
    chaosagent.dev/capability-tier: experimenter
